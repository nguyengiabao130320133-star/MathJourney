<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Hybrid Math Game PRO MAX</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    text-align:center;
}

/* TOP BAR */
#topBar{
    display:flex;
    justify-content:space-around;
    padding:15px;
    background:rgba(0,0,0,0.3);
}

/* XP BAR */
#xpBar{
    width:80%;
    height:15px;
    background:#333;
    margin:10px auto;
    border-radius:20px;
    overflow:hidden;
}

#xpFill{
    height:100%;
    width:0%;
    background:limegreen;
    transition:0.3s;
}

/* GAME */
#gameBox{
    margin-top:20px;
}

.card{
    background:white;
    color:black;
    width:320px;
    margin:auto;
    padding:20px;
    border-radius:15px;
}

input{
    padding:10px;
    width:120px;
    text-align:center;
    font-size:18px;
}

button{
    margin-top:10px;
    padding:10px 20px;
    border:none;
    background:#ffcc00;
    border-radius:10px;
}

/* EFFECT */
.correct{background:limegreen;}
.wrong{background:red;}

.flash{
    animation:flash 0.3s;
}

@keyframes flash{
    0%{background:red;}
    50%{background:transparent;}
}

/* TIMER WARNING */
.warning{
    animation:blink 0.4s infinite;
}

@keyframes blink{
    0%{color:red;}
    50%{color:transparent;}
}

/* POPUP */
#popup{
    position:fixed;
    top:20%;
    left:50%;
    transform:translateX(-50%);
    background:black;
    padding:10px 20px;
    border-radius:10px;
    display:none;
}
</style>
</head>

<body>

<!-- TOP -->
<div id="topBar">
    <div>🔥 Streak: <span id="streak">0</span></div>
    <div>⭐ XP: <span id="xp">0</span></div>
    <div>🏆 Level: <span id="level">1</span></div>
</div>

<!-- XP BAR -->
<div id="xpBar">
    <div id="xpFill"></div>
</div>

<!-- TIMER -->
<h2 id="timer">⏱ 0</h2>

<!-- GAME -->
<div id="gameBox">

    <h2 id="qnum"></h2>

    <div class="card">
        <h2 id="question"></h2>
        <input id="ans">
        <br>
        <button onclick="check()">Trả lời</button>
    </div>

</div>

<!-- POPUP -->
<div id="popup"></div>

<script>

/* AUDIO */
let ok = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
let no = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
let levelUpSound = new Audio("https://actions.google.com/sounds/v1/cartoon/concussive_hit_guitar_boing.ogg");
let cupSound = new Audio("https://actions.google.com/sounds/v1/cartoon/concussive_hit_guitar_boing.ogg");

/* DATA */
let q=1;
let correct=0;

let xp=0;
let level=1;
let streak=1;

let time;
let t;

/* LOAD */
if(localStorage.getItem("xp")) xp=+localStorage.getItem("xp");
if(localStorage.getItem("level")) level=+localStorage.getItem("level");
if(localStorage.getItem("streak")) streak=+localStorage.getItem("streak");

updateUI();
next();

/* QUESTION */
function next(){

    if(q>10){
        end();
        return;
    }

    document.getElementById("qnum").innerText="Câu "+q;

    let a,b,op;

    if(q<=5){
        a=Math.floor(Math.random()*10);
        b=Math.floor(Math.random()*10);
        op="+";
        time=10;
    }
    else if(q<=8){
        a=Math.floor(Math.random()*50);
        b=Math.floor(Math.random()*20);
        op=Math.random()>0.5?"+":"-";
        time=30;
    }
    else{
        a=Math.floor(Math.random()*100);
        b=Math.floor(Math.random()*50);
        op=Math.random()>0.5?"*":"-";
        time=60;
    }

    if(op=="+") correct=a+b;
    if(op=="-") correct=a-b;
    if(op=="*") correct=a*b;

    document.getElementById("question").innerText=a+" "+op+" "+b;

    startTime();
}

/* TIMER */
function startTime(){

    clearInterval(t);

    document.getElementById("timer").classList.remove("warning");

    t=setInterval(()=>{

        time--;
        document.getElementById("timer").innerText="⏱ "+time;

        if(time<=5){
            document.getElementById("timer").classList.add("warning");
        }

        if(time<=0){
            no.play();
            vibrate();
            flash();
            q++;
            next();
        }

    },1000);
}

/* CHECK */
function check(){

    let u=Number(document.getElementById("ans").value);

    if(u==correct){
        xp+=10;
        ok.play();
        show("+10 XP");
        document.body.classList.add("correct");
    }else{
        no.play();
        vibrate();
        document.body.classList.add("wrong");
    }

    setTimeout(()=>{
        document.body.classList.remove("correct","wrong");
    },300);

    document.getElementById("ans").value="";

    q++;

    levelCheck();
    save();
    updateUI();
    next();
}

/* LEVEL */
function levelCheck(){

    if(xp>=100 && level==1){
        level=2;
        levelUp();
    }

    if(xp>=250 && level==2){
        level=3;
        levelUp();
    }

    if(xp>=500 && level==3){
        level=4;
        levelUp();
    }

    if(xp>=800 && level==4){
        level=5;
        levelUp();
    }
}

function levelUp(){
    levelUpSound.play();
    show("LEVEL UP!");
}

/* END */
function end(){

    document.getElementById("gameBox").innerHTML="";

    let cup=0;
    if(xp>=70) cup=1;
    if(xp>=100) cup=2;
    if(xp>=150) cup=3;
    if(xp>=200) cup=5;

    if(cup>0) cupSound.play();

    show("Hoàn thành! 🏆 "+cup+" cúp");
}

/* UI */
function updateUI(){

    document.getElementById("xp").innerText=xp;
    document.getElementById("level").innerText=level;
    document.getElementById("streak").innerText=streak;

    document.getElementById("xpFill").style.width=(xp%100)+"%";
}

/* POPUP */
function show(text){

    let p=document.getElementById("popup");
    p.innerText=text;
    p.style.display="block";

    setTimeout(()=>p.style.display="none",1000);
}

/* VIBRATE */
function vibrate(){
    if(navigator.vibrate){
        navigator.vibrate(200);
    }
}

/* FLASH */
function flash(){
    document.body.classList.add("flash");
    setTimeout(()=>document.body.classList.remove("flash"),300);
}

/* SAVE */
function save(){
    localStorage.setItem("xp",xp);
    localStorage.setItem("level",level);
    localStorage.setItem("streak",streak);
}

</script>

</body>
</html>
