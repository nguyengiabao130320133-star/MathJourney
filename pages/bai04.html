<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Game Toán Có Thời Gian</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#141e30,#243b55);
    color:white;
    text-align:center;
}

/* START */
#startScreen{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

#startBtn{
    padding:20px 40px;
    font-size:22px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background:#ffcc00;
    font-weight:bold;
}

/* GAME */
#gameBox{
    display:none;
    padding:20px;
}

.questionBox{
    background:white;
    color:black;
    max-width:500px;
    margin:auto;
    padding:20px;
    border-radius:15px;
}

input{
    padding:10px;
    font-size:18px;
    width:120px;
    text-align:center;
}

button{
    margin-top:10px;
    padding:10px 20px;
}

/* TIMER */
#timer{
    font-size:30px;
    margin:10px;
    color:#ffcc00;
}

/* RESULT */
#resultScreen{
    display:none;
    padding:40px;
}
</style>

</head>

<body>

<!-- START -->
<div id="startScreen">
    <h1>📚 GAME TOÁN HỌC</h1>
    <p>Bấm bắt đầu để chơi</p>
    <button id="startBtn">BẮT ĐẦU</button>
</div>

<!-- GAME -->
<div id="gameBox">

    <h2 id="levelText"></h2>
    <div id="timer">⏱ 0</div>

    <div class="questionBox">
        <h2 id="question"></h2>
        <input type="number" id="answer">
        <br>
        <button onclick="check()">Trả lời</button>
    </div>

    <p id="scoreText"></p>

</div>

<!-- RESULT -->
<div id="resultScreen">
    <h1>🎉 HOÀN THÀNH 🎉</h1>
    <h2 id="smart"></h2>
    <p id="cup"></p>
</div>

<script>

let current = 1;
let score = 0;
let correct = 0;

let time = 0;
let timer;

document.getElementById("startBtn").onclick = function(){
    document.getElementById("startScreen").style.display="none";
    document.getElementById("gameBox").style.display="block";
    nextQuestion();
}

// ===== TIME RULE =====
function getTimeLimit(q){
    if(q <= 5) return 10;
    if(q <= 8) return 30;
    return 60;
}

// ===== QUESTION =====
function nextQuestion(){

    if(current > 10){
        endGame();
        return;
    }

    document.getElementById("levelText").innerText = "Câu " + current;

    let a,b,op;

    if(current <= 5){
        a = rand(10);
        b = rand(10);
        op = "+";
    }
    else if(current <= 8){
        a = rand(50);
        b = rand(20);
        op = Math.random()>0.5?"+":"-";
    }
    else{
        a = rand(100);
        b = rand(50);
        op = Math.random()>0.5?"*":"-";
    }

    if(op=="+") correct = a+b;
    if(op=="-") correct = a-b;
    if(op=="*") correct = a*b;

    document.getElementById("question").innerText =
        a + " " + op + " " + b + " = ?";

    startTimer(getTimeLimit(current));
}

// ===== TIMER =====
function startTimer(sec){

    clearInterval(timer);
    time = sec;

    document.getElementById("timer").innerText = "⏱ " + time;

    timer = setInterval(()=>{
        time--;
        document.getElementById("timer").innerText = "⏱ " + time;

        if(time <= 0){
            clearInterval(timer);
            autoNext();
        }
    },1000);
}

// ===== HẾT GIỜ =====
function autoNext(){
    current++;
    nextQuestion();
}

// ===== CHECK =====
function check(){

    let ans = Number(document.getElementById("answer").value);

    if(ans === correct){
        score++;
    }

    document.getElementById("answer").value="";

    current++;
    nextQuestion();
}

// ===== END =====
function endGame(){

    document.getElementById("gameBox").style.display="none";
    document.getElementById("resultScreen").style.display="block";

    let level = "";

    if(score <= 5) level = "Trung bình 🟡";
    else if(score <= 8) level = "Giỏi 🟢";
    else level = "Siêu thông minh 🔴";

    document.getElementById("smart").innerText =
        "Mức độ: " + level;

    let cups = 0;

    if(score >= 7) cups = 1;
    if(score >= 8) cups = 2;
    if(score >= 9) cups = 3;
    if(score == 10) cups = 5;

    let c = "";
    for(let i=0;i<cups;i++) c += "🏆 ";

    document.getElementById("cup").innerText =
        "Bạn nhận được: " + c;
}

function rand(n){
    return Math.floor(Math.random()*n);
}

</script>

</body>
</html>
