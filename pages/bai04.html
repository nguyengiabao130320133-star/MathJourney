<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Math Game Ultimate</title>

<style>
/* ================= RESET ================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

/* ================= BODY ================= */
body{
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    text-align:center;
}

/* ================= START SCREEN ================= */
#startScreen{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

#startScreen h1{
    font-size:42px;
    margin-bottom:10px;
}

#startScreen p{
    opacity:0.8;
    margin-bottom:20px;
}

#startBtn{
    padding:18px 45px;
    font-size:22px;
    border:none;
    border-radius:15px;
    background:#ffcc00;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

#startBtn:hover{
    transform:scale(1.1);
}

/* ================= GAME AREA ================= */
#gameBox{
    display:none;
    padding:20px;
}

/* TOP INFO */
#qnum{
    font-size:28px;
    margin-top:10px;
}

#timer{
    font-size:40px;
    color:#ffcc00;
    margin:10px;
}

/* WARNING TIMER */
.warning{
    animation:blink 0.4s infinite;
}

@keyframes blink{
    0%{color:red;}
    50%{color:transparent;}
}

/* ================= QUESTION BOX ================= */
.box{
    background:white;
    color:black;
    max-width:600px;
    margin:auto;
    padding:25px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

input{
    padding:12px;
    font-size:18px;
    width:140px;
    text-align:center;
}

button{
    margin-top:10px;
    padding:10px 20px;
    border:none;
    background:#0b4f2f;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

/* ================= FLASH EFFECT ================= */
.flash{
    animation:flashbg 0.3s;
}

@keyframes flashbg{
    0%{background:red;}
    50%{background:transparent;}
}

/* ================= RESULT ================= */
#result{
    display:none;
    padding:40px;
}

#result h1{
    font-size:40px;
}

.home{
    display:inline-block;
    margin-top:20px;
    padding:12px 25px;
    background:#ffcc00;
    color:black;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
}

.playAgain{
    margin-top:10px;
    display:inline-block;
    padding:10px 20px;
    background:white;
    color:black;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- ================= START ================= -->
<div id="startScreen">
    <h1>🎮 ULTIMATE MATH GAME</h1>
    <p>Phân số • Lời văn • Tư duy logic</p>
    <button id="startBtn">BẮT ĐẦU</button>
</div>

<!-- ================= GAME ================= -->
<div id="gameBox">

    <h2 id="qnum"></h2>
    <div id="timer">⏱ 0</div>

    <div class="box">
        <h2 id="question"></h2>
        <input id="ans">
        <br>
        <button onclick="check()">Trả lời</button>
    </div>

</div>

<!-- ================= RESULT ================= -->
<div id="result">

    <h1>🎉 HOÀN THÀNH</h1>

    <h2 id="level"></h2>
    <p id="cup"></p>

    <div class="playAgain" onclick="location.reload()">🔄 Chơi lại</div>

    <a class="home" href="../index.html">⬅ Trang chủ</a>

</div>

<script>

/* ================= AUDIO ================= */
let bg = new Audio("https://actions.google.com/sounds/v1/ambiences/forest_ambience.ogg");
bg.loop = true;
bg.volume = 0.3;

let ok = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
let no = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
let cupSound = new Audio("https://actions.google.com/sounds/v1/cartoon/concussive_hit_guitar_boing.ogg");

/* ================= DATA ================= */
let q=1;
let score=0;
let correct=0;
let time;
let t;

/* ================= START ================= */
document.getElementById("startBtn").onclick=function(){
    document.getElementById("startScreen").style.display="none";
    document.getElementById("gameBox").style.display="block";
    bg.play();
    next();
};

/* ================= GENERATE QUESTION ================= */
function next(){

    if(q>10){
        end();
        return;
    }

    document.getElementById("qnum").innerText="Câu "+q;

    let a,b,op;

    // EASY
    if(q<=5){
        a=Math.floor(Math.random()*10);
        b=Math.floor(Math.random()*10);
        op="+";
    }

    // MEDIUM
    else if(q<=8){
        a=Math.floor(Math.random()*50);
        b=Math.floor(Math.random()*20);
        op=Math.random()>0.5?"+":"-";
    }

    // HARD
    else{
        a=Math.floor(Math.random()*100);
        b=Math.floor(Math.random()*50);
        op=Math.random()>0.5?"*":"-";
    }

    if(op=="+") correct=a+b;
    if(op=="-") correct=a-b;
    if(op=="*") correct=a*b;

    document.getElementById("question").innerText=a+" "+op+" "+b;

    startTime();
}

/* ================= TIMER ================= */
function startTime(){

    clearInterval(t);

    if(q<=5) time=10;
    else if(q<=8) time=30;
    else time=60;

    document.getElementById("timer").classList.remove("warning");

    t=setInterval(()=>{

        time--;

        document.getElementById("timer").innerText="⏱ "+time;

        if(time<=5){
            document.getElementById("timer").classList.add("warning");
        }

        if(time<=0){
            no.play();
            flash();
            vibrate();
            q++;
            next();
        }

    },1000);
}

/* ================= FLASH ================= */
function flash(){
    document.body.classList.add("flash");
    setTimeout(()=>{
        document.body.classList.remove("flash");
    },300);
}

/* ================= VIBRATE ================= */
function vibrate(){
    if(navigator.vibrate){
        navigator.vibrate(300);
    }
}

/* ================= CHECK ANSWER ================= */
function check(){

    let u=document.getElementById("ans").value;

    if(u==correct){
        score++;
        ok.play();
    }else{
        no.play();
        vibrate();
    }

    document.getElementById("ans").value="";

    q++;
    next();
}

/* ================= END GAME ================= */
function end(){

    bg.pause();

    document.getElementById("gameBox").style.display="none";
    document.getElementById("result").style.display="block";

    let lv="";

    if(score<=5) lv="🟡 Trung bình";
    else if(score<=8) lv="🟢 Giỏi";
    else lv="🔴 Siêu thông minh";

    document.getElementById("level").innerText=lv;

    let cup=0;

    if(score>=7) cup=1;
    if(score>=8) cup=2;
    if(score>=9) cup=3;
    if(score==10) cup=5;

    let text="";
    for(let i=0;i<cup;i++) text+="🏆 ";

    document.getElementById("cup").innerText="Cúp: "+text;

    if(cup>0){
        cupSound.play();
    }
}

</script>

</body>
</html>
