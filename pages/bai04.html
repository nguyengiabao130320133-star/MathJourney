<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Game Toán Lớp 5</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    text-align:center;
}

#startScreen{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

#startBtn{
    padding:20px 40px;
    font-size:22px;
    border:none;
    border-radius:15px;
    background:#ffcc00;
    font-weight:bold;
    cursor:pointer;
}

#gameBox{display:none;padding:20px;}

.box{
    background:white;
    color:black;
    max-width:600px;
    margin:auto;
    padding:20px;
    border-radius:15px;
}

input{
    padding:10px;
    font-size:18px;
    width:120px;
}

button{padding:10px 20px;margin-top:10px;}

#timer{
    font-size:30px;
    color:#ffcc00;
    margin:10px;
}
</style>
</head>

<body>

<!-- START -->
<div id="startScreen">
    <h1>📚 GAME TOÁN LỚP 5</h1>
    <p>Phân số • Lời văn • Thử thách trí tuệ</p>
    <button id="startBtn">BẮT ĐẦU</button>
</div>

<!-- GAME -->
<div id="gameBox">

    <h2 id="qnum"></h2>
    <div id="timer">⏱ 0</div>

    <div class="box">
        <h2 id="question"></h2>
        <input id="ans" type="text">
        <br>
        <button onclick="check()">Trả lời</button>
    </div>

</div>

<!-- RESULT -->
<div id="result" style="display:none">
    <h1>🎉 HOÀN THÀNH</h1>
    <h2 id="level"></h2>
    <p id="cup"></p>
</div>

<script>
let correctSound = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
let wrongSound = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
let q=1;
let score=0;
let correct=0;
let time;
let t;

document.getElementById("startBtn").onclick=function(){
    document.getElementById("startScreen").style.display="none";
    document.getElementById("gameBox").style.display="block";
    next();
};

function next(){

    if(q>10){
        end();
        return;
    }

    document.getElementById("qnum").innerText="Câu "+q;

    let type = q<=5?1:q<=8?2:3;

    let a,b,op;

    if(type==1){
        // phân số dễ
        let arr=["1/2 + 1/2 = ?","2/3 + 1/3 = ?","3/4 - 1/4 = ?","1/2 + 1/4 = ?","5/10 = 1/ ?"];
        document.getElementById("question").innerText=arr[Math.floor(Math.random()*arr.length)];
        correct="1";
    }

    else if(type==2){
        // số thập phân + tính nhanh
        a=(Math.random()*10).toFixed(1);
        b=(Math.random()*10).toFixed(1);
        correct=(parseFloat(a)+parseFloat(b)).toFixed(1);
        document.getElementById("question").innerText=a+" + "+b+" = ?";
    }

    else{
        // lời văn + đố mẹo
        let arr=[
            {q:"Một cửa hàng có 12 quả táo, bán 5 quả. Hỏi còn lại?",a:"7"},
            {q:"Một hình chữ nhật dài 10m, rộng 5m. Chu vi?",a:"30"},
            {q:"Có 3 người, mỗi người 2 cái kẹo. Tổng?",a:"6"},
            {q:"Nếu hôm nay là thứ Hai, sau 3 ngày là thứ mấy? (4 ký tự)",a:"Thứ Năm"},
            {q:"10 con gà có bao nhiêu chân?",a:"20"}
        ];

        let r=arr[Math.floor(Math.random()*arr.length)];
        document.getElementById("question").innerText=r.q;
        correct=r.a;
    }

    startTime(type);
}

function startTime(type){

    clearInterval(t);

    if(type==1) time=10;
    else if(type==2) time=30;
    else time=60;

    document.getElementById("timer").innerText="⏱ "+time;

    t=setInterval(()=>{
        time--;
        document.getElementById("timer").innerText="⏱ "+time;

        if(time<=0){
    wrongSound.play();   // 🔊 âm thanh khi hết giờ
    clearInterval(t);    // dừng đồng hồ
    q++;                 // sang câu tiếp theo
    next();              // tạo câu mới
}
    },1000);
}

function check(){

    let user=document.getElementById("ans").value.trim();

    if(user==correct){
        score++;
        correctSound.play(); // 🔊 đúng
    }else{
        wrongSound.play(); // 🔊 sai
    }

    q++;
    next();
}

function end(){

    document.getElementById("gameBox").style.display="none";
    document.getElementById("result").style.display="block";

    let lv="";

    if(score<=5) lv="Trung bình 🟡";
    else if(score<=8) lv="Giỏi 🟢";
    else lv="Siêu thông minh 🔴";

    document.getElementById("level").innerText=lv;

    let cup=0;
    if(score>=7) cup=1;
    if(score>=8) cup=2;
    if(score>=9) cup=3;
    if(score==10) cup=5;

    let c="";
    for(let i=0;i<cup;i++) c+="🏆 ";

    document.getElementById("cup").innerText="Cúp: "+c;
}

</script>

</body>
</html>
