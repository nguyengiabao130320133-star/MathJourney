<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Math Arena Pro - Lớp 6</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

.menu button{
padding:10px;
margin:5px;
background:#334155;
color:white;
border:none;
border-radius:8px;
}

.page{display:none;}
.active{display:block;}

.card{
width:520px;
margin:20px auto;
background:white;
color:black;
padding:15px;
border-radius:12px;
}

input{padding:8px;width:120px;text-align:center;}

canvas{background:#fff;margin-top:10px;border-radius:10px;}
</style>
</head>

<body>

<div class="menu">
<button onclick="show('solo')">🎮 Solo</button>
<button onclick="show('pvp')">⚔️ PvP</button>
</div>

<!-- SOLO -->
<div id="solo" class="page active">
<div class="card">

<h3 id="qtext">Loading...</h3>
<canvas id="cv" width="200" height="150"></canvas>

<input id="ans">
<button onclick="check()">OK</button>

<p>⭐ <span id="score">0</span> | 📘 <span id="q">1</span>/40</p>
<p id="exp"></p>

</div>
</div>

<!-- PVP -->
<div id="pvp" class="page">
<div class="card">

<h3 id="pq">PvP Ready</h3>

<input id="pans">
<button onclick="checkPvP()">Send</button>

<p>You: <span id="me">0</span> | Enemy: <span id="en">0</span></p>
<p id="rank"></p>

</div>
</div>

<script>

function show(id){
document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* ================= SOLO ================= */

let q=1,score=0,correct=0;

function gen(){

let a=r(-20,30), b=r(-20,30), type=r(1,4);

let exp="";

if(q<=10){
correct=a+b;
setQ(`${a} + ${b} = ?`);
exp="Số nguyên có dấu";
drawAngle();
}

else if(q<=20){
correct=a-b;
setQ(`${a} - ${b} = ?`);
exp="Trừ số nguyên";
}

else if(q<=30){
let x=r(10,80);
correct=x;
setQ(`Góc ${x}° là loại góc gì? (1: nhọn 2: vuông 3: tù)`);
exp="Hình học góc";
}

else{
let x=r(5,20);
correct=x;
setQ(`3x - 2 = ${3*x-2}. Tìm x`);
exp="Suy luận cuối chương";
}

document.getElementById('exp').innerText=exp;
document.getElementById('q').innerText=q;
}

function setQ(t){
document.getElementById('qtext').innerText=t;
}

function check(){
let u=+ans.value;
if(u==correct) score+=10;
q++;
ans.value="";
if(q>40){
document.body.innerHTML=`<h1>🏆 ${rank(score)}</h1>`;
return;
}
gen();
document.getElementById('score').innerText=score;
}

/* ================= CANVAS ================= */

function drawAngle(){
let c=document.getElementById("cv");
let ctx=c.getContext("2d");
ctx.clearRect(0,0,200,150);

ctx.beginPath();
ctx.moveTo(100,75);
ctx.lineTo(50,120);
ctx.moveTo(100,75);
ctx.lineTo(150,120);
ctx.stroke();
}

/* ================= PVP ================= */

let me=0,en=0,pc=0;

function genPvP(){
let a=r(1,20),b=r(1,20);
pc=a+b;
document.getElementById('pq').innerText=`${a}+${b}`;
}

function checkPvP(){
let u=+pans.value;
if(u==pc) me++; else en++;
pans.value="";
genPvP();

document.getElementById('me').innerText=me;
document.getElementById('en').innerText=en;

document.getElementById('rank').innerText=rank(me-en);
}

/* ================= AI ================= */

function r(a,b){
return Math.floor(Math.random()*(b-a+1))+a;
}

function rank(s){
if(s<5) return "Bronze";
if(s<15) return "Silver";
if(s<25) return "Gold";
return "Legend";
}

/* START */
gen();
genPvP();

</script>

</body>
</html>
