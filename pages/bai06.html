<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Math Arena - Bài 6</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
    text-align:center;
}

.menu{
    display:flex;
    justify-content:center;
    gap:10px;
    padding:10px;
    background:#111827;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:10px;
    background:#334155;
    color:white;
    cursor:pointer;
}

button:hover{background:#22c55e;}

.page{display:none;padding:20px;}
.active{display:block;}

.card{
    width:500px;
    margin:20px auto;
    background:white;
    color:black;
    padding:20px;
    border-radius:15px;
}

input{
    padding:10px;
    width:120px;
    text-align:center;
}

.badge{
    padding:5px 10px;
    border-radius:10px;
    background:#22c55e;
    display:inline-block;
}
</style>
</head>

<body>

<div class="menu">
<button onclick="show('solo')">🎮 Solo 40 câu</button>
<button onclick="show('pvp')">⚔️ PvP</button>
</div>

<!-- SOLO -->
<div id="solo" class="page active">

<div class="card">
<h2>📚 SOLO MODE</h2>

<h3 id="qText">Loading...</h3>
<input id="ans">
<br>
<button onclick="checkSolo()">Trả lời</button>

<p>⏱ <span id="time">0</span>s</p>
<p>⭐ Điểm: <span id="score">0</span></p>
<p>📘 Câu: <span id="q">1</span>/40</p>

<p id="exp"></p>
</div>

</div>

<!-- PVP -->
<div id="pvp" class="page">

<div class="card">
<h2>⚔️ PvP ARENA</h2>

<h3 id="pq">Ready</h3>

<input id="pans">
<button onclick="checkPvP()">OK</button>

<p>You: <span id="me">0</span> | Enemy: <span id="enemy">0</span></p>
<p id="rank"></p>
</div>

</div>

<script>

/* SWITCH */
function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* ================= AI GENERATOR ================= */

let q=1, score=0, correct=0, time=10;

function genSolo(){

let type = Math.ceil(Math.random()*4);
let a,b,ans,exp="";

if(q<=10){
a=r(1,20); b=r(1,20);
ans=a+b;
time=10;
exp="Cộng số tự nhiên cơ bản";
showQ(a+" + "+b,ans,exp);
}

else if(q<=20){
a=r(10,50); b=r(1,30);
ans=a-b;
time=20;
exp="Trừ số tự nhiên có nhớ";
showQ(a+" - "+b,ans,exp);
}

else if(q<=30){
if(type<=2){
a=r(2,12); b=r(2,12);
ans=a*b;
exp="Nhân số tự nhiên";
showQ(a+" × "+b,ans,exp);
}
else{
a=r(10,50);
ans=a;
exp="Một số tăng/giảm theo đề bài";
showQ("Số x + 5 = "+(a+5)+". Tìm x",ans,exp);
}
}

else{
/* HSG STYLE (GIỐNG ĐỀ BẠN GỬI) */
let x=r(5,30);
ans=x;
exp="Bài suy luận nhiều bước";

showQ(
"Ba lần một số trừ 6 bằng "+(3*x-6)+". Tìm số",
ans,
exp
);
}

}

function showQ(t,a,e){
document.getElementById("qText").innerText=t;
correct=a;
document.getElementById("exp").innerText="";
}

/* CHECK SOLO */
function checkSolo(){
let u=Number(ans.value);

if(u==correct){
score+=10;
document.getElementById("exp").innerText="✔ Đúng: "+document.getElementById("exp").innerText;
}

q++;

if(q>40){
end();
return;
}

ans.value="";
genSolo();

document.getElementById("score").innerText=score;
document.getElementById("q").innerText=q;
}

/* END */
function end(){

let rank="Bronze";
if(score>200) rank="Silver";
if(score>300) rank="Gold";
if(score>350) rank="Diamond";
if(score>380) rank="Legend";

document.body.innerHTML=`
<h1>🏆 HOÀN THÀNH</h1>
<h2>Score: ${score}</h2>
<div class="badge">${rank}</div>
<br><br>
<button onclick="location.reload()">Chơi lại</button>
`;
}

/* ================= PVP (LOCAL ARENA) ================= */

let me=0, enemy=0, pc=0;

function genPvP(){

let a=r(1,20);
let b=r(1,20);
pc=a+b;

document.getElementById("pq").innerText=a+" + "+b;
}

function checkPvP(){

let u=Number(pans.value);

if(u==pc) me++;
else enemy++;

document.getElementById("me").innerText=me;
document.getElementById("enemy").innerText=enemy;

rank();

pans.value="";
genPvP();
}

function rank(){

let total=me-enemy;

let rnk="Bronze";
if(total>=3) rnk="Silver";
if(total>=6) rnk="Gold";
if(total>=10) rnk="Legend";

document.getElementById("rank").innerText="Rank: "+rnk;
}

/* UTIL */
function r(a,b){
return Math.floor(Math.random()*(b-a+1))+a;
}

/* START */
genSolo();
genPvP();

</script>

</body>
</html>
